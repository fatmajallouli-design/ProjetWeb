<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription – IMPORTY</title>
  <link rel="stylesheet" href="../css/style_inscription.css">
</head>

<body class="inscription-body">

  <div class="inscription-container">
    <h2>S'inscrire</h2>

    <form id="inscriptionForm" action="../php/register.php" method="post">
      <input type="text"name="name" id="username" placeholder="Nom d'utilisateur" required>

      <input type="password" name="password" id="password" placeholder="Mot de passe" required>

      <div class="role">
        <label>
          <input type="radio" name="role" value="client" checked>
          <span>Client</span>
        </label>

        <label>
          <input type="radio" name="role" value="vendeur">
          <span>Vendeur</span>
        </label>
      </div>

      <button type="submit">S'inscrire</button>
    </form>
  </div>

  
</body>
</html>
